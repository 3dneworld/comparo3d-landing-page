<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140">
  <defs>
    <linearGradient id="badgeGradientOrg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadowFilter">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Circular badge background -->
  <circle cx="60" cy="60" r="50" fill="url(#badgeGradientOrg)" filter="url(#shadowFilter)" />

  <!-- Inner highlight ring -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" />

  <!-- Checkmark -->
  <g transform="translate(60, 50)">
    <path d="M -12 -5 L -3 8 L 15 -10"
          stroke="white" stroke-width="3" fill="none"
          stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- "ORGÁNICO" text -->
  <text x="60" y="95" font-family="Montserrat, Arial, sans-serif" font-size="11" font-weight="700"
        fill="white" text-anchor="middle" dominant-baseline="middle" letter-spacing="0.3">ORGÁNICO</text>

  <!-- Decorative leaf accent -->
  <g transform="translate(95, 25)">
    <path d="M 0 0 Q 3 -5 4 -10" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <circle cx="4" cy="-10" r="1.5" fill="rgba(255,255,255,0.7)"/>
  </g>
</svg>
