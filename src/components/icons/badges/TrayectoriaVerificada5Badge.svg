<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140">
  <defs>
    <linearGradient id="shieldGradient5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="shadowFilter">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Shield background -->
  <path d="M 60 15 L 25 35 L 25 65 C 25 95 45 115 60 125 C 75 115 95 95 95 65 L 95 35 Z"
        fill="url(#shieldGradient5)" filter="url(#shadowFilter)" />

  <!-- Inner highlight -->
  <path d="M 60 20 L 30 37 L 30 65 C 30 92 47 110 60 119 C 73 110 90 92 90 65 L 90 37 Z"
        fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" />

  <!-- "5+" text -->
  <text x="60" y="75" font-family="Montserrat, Arial, sans-serif" font-size="32" font-weight="900"
        fill="white" text-anchor="middle" dominant-baseline="middle">5+</text>

  <!-- "AÑOS" subtext -->
  <text x="60" y="100" font-family="Montserrat, Arial, sans-serif" font-size="10" font-weight="600"
        fill="rgba(255,255,255,0.9)" text-anchor="middle" dominant-baseline="middle" letter-spacing="0.5">AÑOS</text>
</svg>
